version: '3.8'

services:
  api:
    build:
      context: ./WeatherEvents
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=WeatherEventsDb;User Id=sa;Password=YourStrong@Passw0rd123!;Encrypt=false;TrustServerCertificate=true
    depends_on:
      - db
      # db:
      #   condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd123!
      - MSSQL_DATABASE=WeatherEventsDb
    # volumes:
    #   - sqlserverdata:/var/opt/mssql/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd123!' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 3s

# volumes:
#   sqlserverdata: